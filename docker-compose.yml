services:
  webui:
    build: .
    ports:
      - "1455:1455"
    environment:
      WEBUI_HOST: 0.0.0.0
      WEBUI_PORT: "1455"
      WEBUI_ACCESS_PASSWORD: "yPazIWDpphsqimsCv3aM"
      DEBUG: "0"
      LOG_LEVEL: info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:1455/login', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
