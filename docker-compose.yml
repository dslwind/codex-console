services:
  webui:
    container_name: codex-console
    build: .
    env_file:
      - .env
    ports:
      - "1455:1455"
    environment:
      WEBUI_HOST: ${WEBUI_HOST:-0.0.0.0}
      WEBUI_PORT: ${WEBUI_PORT:-1455}
      WEBUI_ACCESS_PASSWORD: ${WEBUI_ACCESS_PASSWORD:?set WEBUI_ACCESS_PASSWORD in .env}
      DEBUG: ${DEBUG:-0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:1455/login', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
